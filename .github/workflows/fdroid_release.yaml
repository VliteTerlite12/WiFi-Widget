name: Release Build

on:
    push:
        tags:
            - '*'

concurrency:
    group: release-${{ github.ref }}
    cancel-in-progress: false

jobs:
    build-release:
        name: Build and publish release assets
        runs-on: ubuntu-latest
        permissions:
            contents: write

        steps:
            -   name: Checkout
                uses: actions/checkout@v6
                with:
                    fetch-depth: 0

            -   name: Set up JDK 17
                uses: actions/setup-java@v5
                with:
                    java-version: '17'
                    distribution: 'temurin'
                    cache: gradle

            -   name: Make Gradle executable
                run: chmod +x ./gradlew

            -   name: Prepare signing files
                shell: bash
                env:
                    SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
                    ALIAS: ${{ secrets.ALIAS }}
                    KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
                    KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
                run: |
                    echo "$SIGNING_KEY" | base64 --decode > keys.jks
                    cat <<EOF > keystore.properties
                    storePassword=$KEY_STORE_PASSWORD
                    keyPassword=$KEY_PASSWORD
                    keyAlias=$ALIAS
                    EOF

            -   name: Build signed release artifacts
                env:
                    F_DROID_RELEASE: "true"
                run: ./gradlew assembleRelease bundleRelease

            -   name: Collect release assets
                id: release_assets
                shell: bash
                env:
                    RELEASE_VERSION: ${{ github.ref_name }}
                run: |
                    mkdir -p release-artifacts
                    apk_path=$(find app/build/outputs/apk/release -maxdepth 1 -name "*.apk" | sort | head -n 1)
                    aab_path=$(find app/build/outputs/bundle/release -maxdepth 1 -name "*.aab" | sort | head -n 1)

                    if [[ -z "$apk_path" ]]; then
                      echo "Release APK not found" >&2
                      exit 1
                    fi

                    release_apk="release-artifacts/wifiwidget-${RELEASE_VERSION}.apk"
                    cp "$apk_path" "$release_apk"
                    echo "release_apk=$release_apk" >> "$GITHUB_OUTPUT"

                    if [[ -n "$aab_path" ]]; then
                      release_aab="release-artifacts/wifiwidget-${RELEASE_VERSION}.aab"
                      cp "$aab_path" "$release_aab"
                      echo "release_aab=$release_aab" >> "$GITHUB_OUTPUT"
                    fi

            -   name: Build changelog
                id: build_changelog
                uses: ardalanamini/auto-changelog@v4
                with:
                    mention-authors: false
                    mention-new-contributors: false
                    include-compare-link: true
                    semver: false

            -   name: Generate release metadata
                shell: bash
                env:
                    APK_PATH: ${{ steps.release_assets.outputs.release_apk }}
                    AAB_PATH: ${{ steps.release_assets.outputs.release_aab }}
                run: |
                    chmod +x .github/scripts/generate-release-metadata.sh
                    ./.github/scripts/generate-release-metadata.sh release-artifacts "$APK_PATH" "$AAB_PATH"

            -   name: Build release body
                shell: bash
                env:
                    CHANGELOG: ${{ steps.build_changelog.outputs.changelog }}
                run: |
                    {
                      if [[ -n "$CHANGELOG" ]]; then
                        printf '%s\n\n' "$CHANGELOG"
                      fi
                      cat release-artifacts/release-summary.md
                    } > release-artifacts/release-body.md

            -   name: Upload release artifacts
                uses: actions/upload-artifact@v4
                with:
                    name: release-assets-${{ github.ref_name }}
                    path: release-artifacts/*
                    if-no-files-found: error
                    retention-days: 30

            -   name: Publish GitHub Release
                uses: softprops/action-gh-release@v2
                with:
                    tag_name: ${{ github.ref_name }}
                    name: Release ${{ github.ref_name }}
                    body_path: release-artifacts/release-body.md
                    files: |
                        release-artifacts/*.apk
                        release-artifacts/*.aab
                        release-artifacts/*.sha256
                        release-artifacts/release-metadata.json
                        release-artifacts/release-metadata.txt
                    prerelease: ${{ contains(github.ref_name, '-') }}

            -   name: Cleanup signing files
                if: always()
                run: rm -f keys.jks keystore.properties
